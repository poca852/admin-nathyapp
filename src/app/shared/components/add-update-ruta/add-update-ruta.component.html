<app-header
  [title]="ruta ? 'Editar Ruta': 'Agregar Ruta'"
  [isModal]="true"
/>

<ion-content class="ion-padding">

  <form [formGroup]="form" (ngSubmit)="submit()">

    <custom-input
      [control]="form.controls.nombre"
      type="text"
      label="Nombre"
      autocomplete="off"
    />

    <custom-input
      [control]="form.controls.pais"
      type="text"
      label="Pais"
      autocomplete="off"
    />

    <custom-input
      [control]="form.controls.ciudad"
      type="text"
      label="Ciudad"
      autocomplete="off"
    />

    <ion-item class="custom-input" lines="none">
      <ion-toggle
        [enableOnOffLabels]="true"
        formControlName="autoOpen"
      >Apertura de caja automatico</ion-toggle>
    </ion-item>

    <ion-item class="custom-input" lines="none">
      <ion-select
        aria-label="timeZone"
        interface="popover"
        placeholder="Selecciona la zona horaria de la ruta"
        formControlName="timeZone"
      >
        <ion-select-option value="America/Bogota">
          Colombia (Bogotá - GMT-5)
        </ion-select-option>
        <ion-select-option value="America/Guatemala">
          Guatemala (Ciudad de Guatemala - GMT-6)
        </ion-select-option>
        <ion-select-option value="America/sao_pablo">
          Brasil (São Paulo - GMT-3)
        </ion-select-option>
      </ion-select>
      <ion-note slot="helper">Esto asegura que las horas de la ruta coincidan con la hora local del lugar.</ion-note>
    </ion-item>

    <ion-button mode="ios" type="submit" expand="block" [disabled]="form.invalid">
      {{ruta ? 'Actualizar Ruta' : 'Agregar Ruta'}}
      <ion-icon slot="end" name="checkmark-circle-outline"></ion-icon>
    </ion-button>
  </form>

</ion-content>
