<app-header [title]="ruta ? 'Editar Ruta': 'Agregar Ruta'" [isModal]="true" />

<ion-content class="ion-padding">

  <form [formGroup]="form" (ngSubmit)="submit()">

    <custom-input [control]="form.controls.nombre" type="text" label="Nombre" autocomplete="off" />

    <ion-item class="custom-input" lines="none">
      <ion-select label="Pais" interface="popover" formControlName="pais">
        <ion-select-option value="Colombia">Colombia</ion-select-option>
        <ion-select-option value="Guatemala">Guatemala</ion-select-option>
        <ion-select-option value="Brasil">Brasil</ion-select-option>
      </ion-select>
    </ion-item>

    <custom-input [control]="form.controls.ciudad" type="text" label="Ciudad" autocomplete="off" />

    <ion-item class="custom-input" lines="none">
      <ion-toggle [enableOnOffLabels]="true" formControlName="autoOpen">Apertura de caja automatico</ion-toggle>
    </ion-item>

    <ion-button mode="ios" type="submit" expand="block" [disabled]="form.invalid">
      {{ruta ? 'Actualizar Ruta' : 'Agregar Ruta'}}
      <ion-icon slot="end" name="checkmark-circle-outline"></ion-icon>
    </ion-button>
  </form>

</ion-content>
