<ion-header class="ion-no-border">
  <ion-toolbar color="primary">

    <ion-buttons slot="start">
      <ion-back-button *ngIf="backButton" [defaultHref]="backButton"></ion-back-button>

      <ion-button *ngIf="isModal" (click)="dismissModal()">
        <ion-icon name="close-circle-outline"></ion-icon>
      </ion-button>

      <ion-menu-button *ngIf="showMenu" menu="menu-content">

      </ion-menu-button>
    </ion-buttons>

    <ion-title>

      <strong>{{title}}</strong>
      <div class="admin">N A T H Y</div>

    </ion-title>

    <ion-buttons slot="end">
      <ion-button *ngIf="cantidadPendientes() > 0" (click)="abrirNotificaciones()" fill="clear" size="small">
        <ion-icon name="notifications-outline"></ion-icon>
        <ion-badge color="danger" class="notification-badge">{{cantidadPendientes()}}</ion-badge>
      </ion-button>
      <ion-button *ngIf="pwaInstallSvc.canInstall" (click)="installPwa()" fill="clear" size="small">
        <ion-icon name="download-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
