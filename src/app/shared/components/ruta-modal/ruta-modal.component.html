<app-header [title]="ruta.nombre | titlecase" [isModal]="true" />

<ion-content class="ion-padding">

  @if (!!ruta) {
  <ion-card mode="ios">

    <ion-card-header>
      <ion-grid fixed>
        <ion-row>
          <ion-col>
            <ion-card-title>{{ ruta.nombre | titlecase }}</ion-card-title>
          </ion-col>
        </ion-row>
      </ion-grid>
    </ion-card-header>

    <ion-card-content>
      <ion-grid>

        <ion-row>
          <ion-col size="auto" class="ion-text-end">
            <ion-text>Estado:</ion-text>
          </ion-col>
          <ion-col>
            <ion-badge [color]="ruta.status ? 'success': 'danger'">
              {{ruta.status ? 'Abierta': 'Cerrada'}}
            </ion-badge>
          </ion-col>
        </ion-row>

        <ion-row>
          <ion-col size="5">
            <ion-text>Cartera:</ion-text>
          </ion-col>
          <ion-col>
            <ion-text>{{ruta.cartera | currency:'USD':'symbol':'':'en'}}</ion-text>
          </ion-col>
        </ion-row>

        <ion-row>
          <ion-col size="5">
            <ion-text>Total Clientes:</ion-text>
          </ion-col>
          <ion-col>
            <ion-text>{{ruta.total_clientes}}</ion-text>
          </ion-col>
        </ion-row>

        <ion-row>
          <ion-col size="5">
            <ion-text>Clientes activos:</ion-text>
          </ion-col>
          <ion-col>
            <ion-text>{{ruta.clientes_activos}}</ion-text>
          </ion-col>
        </ion-row>
      </ion-grid>
    </ion-card-content>

  </ion-card>
  }



</ion-content>
